<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Gestor Personal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 font-sans p-4 md:p-8">

    <div class="max-w-6xl mx-auto space-y-8">
        <h1 class="text-3xl font-bold text-center text-indigo-600">Mi Gestor Personal</h1>

        <div class="bg-white p-6 rounded-xl shadow-md grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <h2 class="text-xl font-bold mb-4 text-gray-700">💸 Registro de Finanzas</h2>
                <div class="space-y-3">
                    <input type="number" id="monto" placeholder="Monto ($)" class="w-full p-2 border rounded">
                    <input type="text" id="concepto" placeholder="Concepto (ej. Despensa, Nómina)" class="w-full p-2 border rounded">
                    <select id="tipo" class="w-full p-2 border rounded">
                        <option value="ingreso">Ingreso (+)</option>
                        <option value="egreso">Egreso (-)</option>
                    </select>
                    <button onclick="registrarMovimiento()" class="w-full bg-indigo-600 text-white p-2 rounded font-bold hover:bg-indigo-700">Registrar</button>
                </div>
            </div>
            <div>
                <h2 class="text-xl font-bold mb-2 text-gray-700">Balance: <span id="balance" class="text-indigo-600">$0.00</span></h2>
                <div class="overflow-y-auto h-48 border rounded p-2 bg-gray-50 space-y-2" id="lista-finanzas"></div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <h2 class="text-xl font-bold mb-4 text-gray-700">📝 Notas rápidas</h2>
                <div class="space-y-3">
                    <input type="text" id="nota-titulo" placeholder="Título de la nota" class="w-full p-2 border rounded">
                    <textarea id="nota-contenido" placeholder="Escribe tu nota aquí..." rows="4" class="w-full p-2 border rounded"></textarea>
                    <input type="text" id="nota-categoria" placeholder="Categoría (ej. Trabajo, Idea)" class="w-full p-2 border rounded">
                    <button onclick="guardarNota()" class="w-full bg-emerald-600 text-white p-2 rounded font-bold hover:bg-emerald-700">Guardar Nota</button>
                </div>
            </div>
            <div>
                <h2 class="text-xl font-bold mb-4 text-gray-700">Mis Notas</h2>
                <div class="grid grid-cols-1 gap-4 overflow-y-auto h-64 p-2" id="lista-notas"></div>
            </div>
        </div>
    </div>

    <script>
        // --- Configuración de Supabase ---
        // REEMPLAZA ESTOS DOS VALORES CON LOS DE TU PANEL DE SUPABASE
        const SUPABASE_URL = "https://tu-proyecto.supabase.co";
        const SUPABASE_KEY = "tu-clave-anon-public-aquí";

        // Inicializamos la conexión antes de declarar las funciones
        const miSupabase = Supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let finanzas = [];
        let notas = [];

        // --- FUNCIONES DE FINANZAS ---
        async function cargarFinanzas() {
            const { data, error } = await miSupabase.from('finanzas').select('*').order('id', { ascending: false });
            if (!error) {
                finanzas = data;
                renderFinanzas();
            }
        }

        async function registrarMovimiento() {
            const monto = parseFloat(document.getElementById('monto').value);
            const concepto = document.getElementById('concepto').value;
            const tipo = document.getElementById('tipo').value;
            const fecha = new Date().toLocaleString();

            if (!monto || !concepto) return alert('Por favor llena todos los campos de finanzas');

            const { error } = await miSupabase.from('finanzas').insert([{ monto, concepto, tipo, fecha }]);
            if (!error) {
                document.getElementById('monto').value = '';
                document.getElementById('concepto').value = '';
                cargarFinanzas();
            } else {
                alert('Error al guardar movimiento');
            }
        }

        function renderFinanzas() {
            const lista = document.getElementById('lista-finanzas');
            lista.innerHTML = '';
            let balance = 0;

            finanzas.forEach(item => {
                balance += item.tipo === 'ingreso' ? item.monto : -item.monto;
                const div = document.createElement('div');
                div.className = `p-2 rounded flex justify-between text-sm ${item.tipo === 'ingreso' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`;
                div.innerHTML = `<div><strong>${item.concepto}</strong> <br><small>${item.fecha}</small></div> <span>${item.tipo === 'ingreso' ? '+' : '-'}$${item.monto.toFixed(2)}</span>`;
                lista.appendChild(div);
            });

            const balEl = document.getElementById('balance');
            balEl.textContent = `$${balance.toFixed(2)}`;
            balEl.className = balance >= 0 ? 'text-green-600 font-bold' : 'text-red-600 font
